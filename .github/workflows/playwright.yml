name: Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A push that lands while a PR run is still queued cancels the queued
# run — we never need the historical run, only the latest commit's.
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Pinned to packageManager in package.json. Bump both in lockstep.
          version: 11.1.1

      - uses: actions/setup-node@v4
        with:
          # Node 22 (alpine in Docker) — pnpm 11.x needs node:sqlite.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: tsc
        run: pnpm tsc --noEmit

      - name: Next build
        env:
          # Dummy values so build-time imports of auth.ts + db/client.ts
          # don't crash. The runner script overrides these at runtime
          # for the e2e suite itself.
          DATABASE_URL: postgres://build:build@localhost:5432/build
          BETTER_AUTH_SECRET: ${{ secrets.E2E_BETTER_AUTH_SECRET || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          # HVA-261: Cloudflare's official ALWAYS-PASS test site key —
          # the golden-journey spec drives the customer ticket form,
          # whose Turnstile widget auto-resolves with this key. Pairs
          # with the always-pass test SECRET the e2e runner defaults to.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
        run: pnpm next build

      - name: Vitest
        # Vitest spins up its own Postgres testcontainer, so no extra
        # service container needed here.
        run: pnpm test

      - name: Playwright e2e
        # The runner script (scripts/run-e2e.ts) owns the lifecycle:
        # boots its own testcontainer, applies migrations, seeds users,
        # starts next-server on :3100, polls /api/health, runs tests.
        run: pnpm test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
