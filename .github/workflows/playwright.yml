name: Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A push that lands while a PR run is still queued cancels the queued
# run — we never need the historical run, only the latest commit's.
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  # HVA-270: GitHub forces Node 24 for JS actions on 2026-06-16. Opt in
  # early so CI proves compatibility before the deadline, not on it.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# HVA-284: the suite used to run as ONE serial job (~14 min) whose long
# pole was Vitest (~9 min, single-threaded because every test shares one
# Postgres testcontainer). It's now split into PARALLEL lanes with no loss
# of coverage:
#   - checks : tsc + next build
#   - vitest : sharded 1/4..4/4 — each shard is its own runner booting its
#              own testcontainer, so no cross-shard DB contention; the full
#              suite still runs, just split four ways (~9 min → ~2.5 min)
#   - e2e    : playwright browsers + build + run-e2e
# Wall-clock ≈ max(lanes) ≈ ~4–5 min. All three are required checks.
#
# HVA-291: the repo went public (Actions now free/unlimited), so the lanes
# stay parallel — the goal is wall-clock, not minute-count. Caching added to
# start each lane warm: pnpm store (setup-node), the Next build cache
# (.next/cache in checks + e2e), and the Playwright Chromium download.

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # HVA-291: warm the Next.js incremental build cache so `next build`
      # isn't cold every run. Keyed on lockfile + source; falls back to the
      # newest lockfile-matched cache when sources changed.
      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: nextcache-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            nextcache-${{ hashFiles('pnpm-lock.yaml') }}-
      - name: tsc
        run: pnpm tsc --noEmit
      - name: Next build
        env:
          DATABASE_URL: postgres://build:build@localhost:5432/build
          BETTER_AUTH_SECRET: ${{ secrets.E2E_BETTER_AUTH_SECRET || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
        run: pnpm next build

  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Vitest (shard ${{ matrix.shard }}/4)
        # Each shard boots its own Postgres testcontainer and runs a quarter
        # of the test files. fileParallelism stays off WITHIN a shard (shared
        # container), but the four shards run on four parallel runners.
        run: pnpm exec vitest run --project node --shard=${{ matrix.shard }}/4

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # HVA-291: cache the downloaded Chromium build so we skip the ~100MB
      # re-download each run. --with-deps still runs (cheap; installs the
      # apt system libs the cached browser needs).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      # HVA-291: warm the Next build cache (same as the checks lane).
      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: nextcache-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            nextcache-${{ hashFiles('pnpm-lock.yaml') }}-
      - name: Next build
        env:
          DATABASE_URL: postgres://build:build@localhost:5432/build
          BETTER_AUTH_SECRET: ${{ secrets.E2E_BETTER_AUTH_SECRET || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
        run: pnpm next build
      - name: Playwright e2e
        # run-e2e.ts owns the lifecycle: boots its own testcontainer,
        # applies migrations, seeds users, starts next-server, runs tests.
        run: pnpm test:e2e
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
